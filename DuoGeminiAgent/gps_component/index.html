<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Duo Concierge GPS Picker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        .info-box {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 11px;
            pointer-events: none;
            max-width: 80%;
        }
        /* Estilos dos Marcadores Premium importados do DuoList */
        .restaurant-marker-pin-premium {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--marker-color), #000000 150%);
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: -2px 2px 8px rgba(0, 0, 0, 0.5);
            border: 2px solid #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease-in-out;
        }
        .restaurant-marker-pin-premium i {
            transform: rotate(45deg);
            font-size: 13px;
            color: #ffffff;
        }
        .restaurant-marker-pin-premium:hover {
            transform: rotate(-45deg) scale(1.15);
            box-shadow: -4px 4px 12px rgba(0, 0, 0, 0.6);
            border-color: #fbcd4b;
        }
        .custom-marker-icon {
            background: none !important;
            border: none !important;
        }
    </style>
</head>
<body>
    <div class="info-box" id="info">📍 Obtendo sua localização...</div>
    <div id="map"></div>

    <script>
        // Ponto padrão caso falhe (Centro de BH)
        const DEFAULT_LAT = -19.9191;
        const DEFAULT_LON = -43.9386;
        
        let map = null;
        let marker = null;
        let currentLat = DEFAULT_LAT;
        let currentLon = DEFAULT_LON;
        let gpsSuccess = false;
        let mapInitialized = false;

        // Envia as coordenadas de volta ao Streamlit
        function sendToStreamlit(lat, lon) {
            window.parent.postMessage({
                isStreamlitMessage: true,
                type: "streamlit:setComponentValue",
                value: { lat: lat, lon: lon }
            }, "*");
        }

        // Define a altura do iframe para caber o mapa
        function setHeight() {
            window.parent.postMessage({
                isStreamlitMessage: true,
                type: "streamlit:setFrameHeight",
                height: 220
            }, "*");
        }

        function initMap(lat, lon, success) {
            if (mapInitialized) return;
            mapInitialized = true;

            currentLat = lat;
            currentLon = lon;
            gpsSuccess = success;

            const infoEl = document.getElementById("info");
            if (success) {
                infoEl.innerText = "📍 GPS: Coordenadas obtidas";
                infoEl.style.borderColor = "rgba(251, 205, 75, 0.4)";
            } else {
                infoEl.innerText = "⚠️ Permissão GPS negada. Usando BH Centro (Clique no mapa para alterar)";
                infoEl.style.borderColor = "rgba(239, 68, 68, 0.4)";
            }

            // Inicializa o Leaflet com tiles Dark Mode
            map = L.map('map', { zoomControl: false }).setView([lat, lon], 14);
            L.control.zoom({ position: 'bottomright' }).addTo(map);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://carto.com/">CARTO</a>'
            }).addTo(map);

            // Ícone premium no estilo do DuoList
            const customIcon = L.divIcon({
                html: `<div class="restaurant-marker-pin-premium" style="--marker-color: #fbcd4b">
                         <i class="fa-solid fa-location-crosshairs"></i>
                       </div>`,
                className: 'custom-marker-icon',
                iconSize: [32, 32],
                iconAnchor: [16, 32]
            });

            // Adiciona marcador arrastável com o ícone personalizado
            marker = L.marker([lat, lon], { draggable: true, icon: customIcon }).addTo(map);

            // Evento ao arrastar o marcador
            marker.on('dragend', function() {
                const pos = marker.getLatLng();
                currentLat = pos.lat;
                currentLon = pos.lng;
                infoEl.innerText = "📍 Localização ajustada pelo marcador";
                sendToStreamlit(pos.lat, pos.lng);
            });

            // Evento ao clicar no mapa
            map.on('click', function(e) {
                marker.setLatLng(e.latlng);
                currentLat = e.latlng.lat;
                currentLon = e.latlng.lng;
                infoEl.innerText = "📍 Localização ajustada pelo clique";
                sendToStreamlit(e.latlng.lat, e.latlng.lng);
            });

            // Envia a coordenada inicial
            sendToStreamlit(lat, lon);
        }

        // Tenta obter geolocalização do navegador
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    initMap(position.coords.latitude, position.coords.longitude, true);
                },
                function(error) {
                    console.warn("Erro ao obter geolocalização: ", error);
                    initMap(DEFAULT_LAT, DEFAULT_LON, false);
                },
                { enableHighAccuracy: true, timeout: 6000, maximumAge: 0 }
            );
        } else {
            initMap(DEFAULT_LAT, DEFAULT_LON, false);
        }

        // ── Streamlit Component Protocol ─────────────────────────
        // Envia o sinal de que o componente está pronto para renderizar
        window.parent.postMessage({
            isStreamlitMessage: true,
            apiVersion: 1,
            type: "streamlit:componentReady"
        }, "*");

        // Escuta os eventos enviados pelo Streamlit
        window.addEventListener("message", function(event) {
            if (event.data.type === "streamlit:render") {
                setHeight();
                // Envia as coordenadas se o mapa já estiver inicializado
                if (mapInitialized) {
                    sendToStreamlit(currentLat, currentLon);
                }
            }
        });
    </script>
</body>
</html>
